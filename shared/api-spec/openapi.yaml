openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: FINN Licensing API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: clients
    description: Client management
  - name: products
    description: Product management
  - name: licenses
    description: License management
  - name: public
    description: Public licensing endpoints

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/dashboard:
    get:
      operationId: getDashboard
      tags: [clients]
      summary: Dashboard stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /admin/clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: Client list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products/{id}/releases:
    get:
      operationId: listProductReleases
      tags: [products]
      summary: List all releases for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Release list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Release"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products/{id}/poll:
    post:
      operationId: pollProduct
      tags: [products]
      summary: Poll GitHub for latest release
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Poll result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/licenses:
    get:
      operationId: listLicenses
      tags: [licenses]
      summary: List all licenses
      responses:
        "200":
          description: License list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/License"
    post:
      operationId: createLicense
      tags: [licenses]
      summary: Create a license
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseInput"
      responses:
        "201":
          description: License created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseCreated"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/licenses/{id}:
    get:
      operationId: getLicense
      tags: [licenses]
      summary: Get a license
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: License details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLicense
      tags: [licenses]
      summary: Update a license
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseInput"
      responses:
        "200":
          description: License updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLicense
      tags: [licenses]
      summary: Delete a license
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: License deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/licenses/{id}/toggle:
    post:
      operationId: toggleLicense
      tags: [licenses]
      summary: Toggle license status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: License toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /status:
    get:
      operationId: publicStatus
      tags: [public]
      summary: Public status check
      responses:
        "200":
          description: Server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStatus"

  /validate:
    post:
      operationId: publicValidate
      tags: [public]
      summary: Validate a license
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateResponse"

  /products:
    get:
      operationId: publicProducts
      tags: [public]
      summary: List available products
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PublicProduct"
                required:
                  - data
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /update-check:
    get:
      operationId: publicUpdateCheck
      tags: [public]
      summary: Check for updates
      parameters:
        - name: product_id
          in: query
          required: true
          schema:
            type: string
        - name: license
          in: query
          required: true
          schema:
            type: string
        - name: fingerprint
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Update info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCheckResponse"

  /download:
    get:
      operationId: publicDownload
      tags: [public]
      summary: Download plugin
      parameters:
        - name: product_id
          in: query
          required: true
          schema:
            type: string
        - name: license
          in: query
          required: true
          schema:
            type: string
        - name: fingerprint
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plugin ZIP file
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
      required:
        - id
        - email
        - name

    DashboardStats:
      type: object
      properties:
        clientCount:
          type: integer
        productCount:
          type: integer
        licenseCount:
          type: integer
        activeLicenseCount:
          type: integer
      required:
        - clientCount
        - productCount
        - licenseCount
        - activeLicenseCount

    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        company:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        licenseCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - licenseCount
        - createdAt

    ClientInput:
      type: object
      properties:
        name:
          type: string
        company:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - name

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        githubRepo:
          type: string
        description:
          type: string
          nullable: true
        latestVersion:
          type: string
          nullable: true
        releaseDate:
          type: string
          format: date-time
          nullable: true
        changelog:
          type: string
          nullable: true
        downloadUrl:
          type: string
          nullable: true
        requiresWp:
          type: string
          nullable: true
        testedWp:
          type: string
          nullable: true
        requiresPhp:
          type: string
          nullable: true
        lastChecked:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - githubRepo
        - createdAt

    ProductInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        githubRepo:
          type: string
        description:
          type: string
          nullable: true
        requiresWp:
          type: string
          nullable: true
        testedWp:
          type: string
          nullable: true
        requiresPhp:
          type: string
          nullable: true
      required:
        - name
        - slug
        - githubRepo

    PollResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        product:
          $ref: "#/components/schemas/Product"
      required:
        - success
        - message

    License:
      type: object
      properties:
        id:
          type: integer
        licenseKey:
          type: string
        clientId:
          type: integer
          nullable: true
        clientName:
          type: string
          nullable: true
        domain:
          type: string
        pluginAccess:
          type: string
          enum: [all, specific]
        productIds:
          type: array
          items:
            type: integer
          nullable: true
        status:
          type: string
          enum: [active, revoked]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - licenseKey
        - domain
        - pluginAccess
        - status
        - createdAt

    LicenseInput:
      type: object
      properties:
        clientId:
          type: integer
        domain:
          type: string
        pluginAccess:
          type: string
          enum: [all, specific]
        productIds:
          type: array
          items:
            type: integer
          nullable: true
        status:
          type: string
          enum: [active, revoked]
      required:
        - clientId
        - domain
        - pluginAccess

    LicenseCreated:
      type: object
      properties:
        license:
          $ref: "#/components/schemas/License"
        licenseKey:
          type: string
      required:
        - license
        - licenseKey

    PublicStatus:
      type: object
      properties:
        status:
          type: string
        version:
          type: string
      required:
        - status
        - version

    ValidateRequest:
      type: object
      properties:
        key:
          type: string
        fingerprint:
          type: string
      required:
        - key
        - fingerprint

    ValidateResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            valid:
              type: boolean
          required:
            - valid
      required:
        - data

    PublicProduct:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        version:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
      required:
        - id
        - name
        - slug

    Release:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        version:
          type: string
        tagName:
          type: string
        changelog:
          type: string
          nullable: true
        downloadUrl:
          type: string
          nullable: true
        zipballUrl:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - productId
        - version
        - tagName
        - createdAt

    UpdateCheckResponse:
      type: object
      properties:
        version:
          type: string
          nullable: true
        download_url:
          type: string
          nullable: true
        slug:
          type: string
          nullable: true
        tested:
          type: string
          nullable: true
        requires:
          type: string
          nullable: true
        requires_php:
          type: string
          nullable: true
        sections:
          type: object
          properties:
            changelog:
              type: string
          nullable: true
